name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip
          pip install build

      - name: Verify tag matches package version
        run: |
          tag="${GITHUB_REF_NAME#v}"
          pkg_version=$(python -c "import re,pathlib; print(re.search(r'__version__\\s*=\\s*\"([^\"]+)\"', pathlib.Path('src/getmycar/__init__.py').read_text()).group(1))")
          echo "tag=$tag pkg=$pkg_version"
          test "$tag" = "$pkg_version"

      - name: Build wheel + sdist
        run: python -m build

      - name: Extract changelog section
        id: changelog
        run: |
          tag="${GITHUB_REF_NAME#v}"
          if [ -f CHANGELOG.md ]; then
            python <<'EOF' > release_notes.md
          import os, re, pathlib
          tag = os.environ["GITHUB_REF_NAME"].lstrip("v")
          text = pathlib.Path("CHANGELOG.md").read_text(encoding="utf-8")
          m = re.search(rf"##\s*\[?{re.escape(tag)}\]?.*?\n(.*?)(?=\n##\s|\Z)", text, re.S)
          print(m.group(1).strip() if m else f"Release {tag}")
          EOF
          else
            echo "Release ${GITHUB_REF_NAME}" > release_notes.md
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          body_path: release_notes.md
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}

      # Future PyPI publish — uncomment after configuring trusted publishing.
      # - name: Publish to PyPI
      #   uses: pypa/gh-action-pypi-publish@release/v1
